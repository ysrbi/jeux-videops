name: Frontend Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "dev", "main" ]

jobs:
  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Lint Code (Syntax Check)
        run: npx eslint .

      - name: Build Launcher
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-dist
          path: frontend/dist/

  deployment:
    needs: integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Prepare Final Directory
        run: |
          mkdir -p public_deploy
          cp -r frontend/dist/* public_deploy/
          mkdir -p public_deploy/games
          cp -r games/* public_deploy/games/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public_deploy'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4