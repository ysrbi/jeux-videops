name: Two Ships Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install
      
      - name: Audit Dependencies
        run: npm audit --audit-level=high
      
      - name: Linter (Google Style)
        run: npx eslint "games/two_ships/**"
      
      - name: Run Unit Tests
        run: npx mocha tests/two_ships_tests/unitaires/*.mjs
        
      - name: Run Functional Tests
        run: npx mocha tests/two_ships_tests/fonctionnels/*.mjs
        
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-two-ships
          path: |
            tests/two_ships_tests/unitaires/
            tests/two_ships_tests/fonctionnels/

  deployment:
    needs: integration
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/two-ships:latest
            ghcr.io/${{ github.actor }}/two-ships:${{ github.sha }}