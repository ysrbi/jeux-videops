name: CD Jeux Videops

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Connexion au github
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construction et push de l'img docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.actor }}/two-ships:latest
            ghcr.io/${{ github.actor }}/two-ships:${{ github.sha }}