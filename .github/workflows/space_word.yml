name: Space Word Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "dev", "main" ]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npx eslint "frontend/public/games/space_word/**"

        
      - name: Run Unit Tests
        run: npx mocha tests/space_word_tests/**/*.test.mjs

      - name: Run Functional Tests
        run: npx mocha tests/space_word_tests/**/*.test.mjs

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-space-word
          path: tests/space_word_tests/

  deployment:
    needs: integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./games/space_word
          file: ./games/space_word/Dockerfile
          push: true
          tags: ghcr.io/${{ github.actor }}/space-word:latest

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4