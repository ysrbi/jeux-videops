name: Space Word Pipeline
 
on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:
    branches: ["main"]
 
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install
        run: npm install
 
      - name: Audit
        id: audit
        run: |
          if npm audit --audit-level=high; then
            echo "::notice title=Audit::✅ Aucune vulnérabilité critique détectée"
            echo "### ✅ Audit des dépendances" >> $GITHUB_STEP_SUMMARY
            echo "Aucune vulnérabilité de niveau high ou critical détectée." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error title=Audit::❌ Vulnérabilités critiques détectées dans les dépendances"
            echo "### ❌ Audit des dépendances" >> $GITHUB_STEP_SUMMARY
            echo "Des vulnérabilités critiques ont été détectées. Consultez les détails ci-dessus." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
 
      - name: Lint
        id: lint
        run: |
          if npx eslint "games/space_word/**"; then
            echo "::notice title=Lint::✅ Le code respecte le Google JavaScript Style Guide"
            echo "### ✅ Lint (Google Style)" >> $GITHUB_STEP_SUMMARY
            echo "Le code respecte le Google JavaScript Style Guide." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error title=Lint::❌ Des erreurs de style ont été détectées"
            echo "### ❌ Lint (Google Style)" >> $GITHUB_STEP_SUMMARY
            echo "Le code ne respecte pas le Google JavaScript Style Guide." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
 
      - name: Run Unit Tests
        id: unit_tests
        run: |
          if npx mocha tests/space_word_tests/unitaires/*.test.mjs; then
            echo "::notice title=Tests Unitaires::✅ Tous les tests unitaires sont passés"
            echo "### ✅ Tests Unitaires" >> $GITHUB_STEP_SUMMARY
            echo "Tous les tests unitaires ont été exécutés avec succès." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error title=Tests Unitaires::❌ Des tests unitaires ont échoué"
            echo "### ❌ Tests Unitaires" >> $GITHUB_STEP_SUMMARY
            echo "Certains tests unitaires ont échoué. Consultez les logs pour plus de détails." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
 
      - name: Run Functional Tests
        id: functional_tests
        run: |
          if npx mocha tests/space_word_tests/fonctionnels/*.test.mjs; then
            echo "::notice title=Tests Fonctionnels::✅ Tous les tests fonctionnels sont passés"
            echo "### ✅ Tests Fonctionnels" >> $GITHUB_STEP_SUMMARY
            echo "Tous les tests fonctionnels ont été exécutés avec succès." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error title=Tests Fonctionnels::❌ Des tests fonctionnels ont échoué"
            echo "### ❌ Tests Fonctionnels" >> $GITHUB_STEP_SUMMARY
            echo "Certains tests fonctionnels ont échoué. Consultez les logs pour plus de détails." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
 
      - name: Pipeline Summary
        if: always()
        run: |
          echo "## 🚀 Space Word Pipeline — Résumé" >> $GITHUB_STEP_SUMMARY
          echo "| Étape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Audit Dépendances | ${{ steps.audit.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Google Style | ${{ steps.lint.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Unitaires   | ${{ steps.unit_tests.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Fonctionnels| ${{ steps.functional_tests.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
 
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-space-word
          path: tests/space_word_tests/
 
  deployment:
    needs: integration
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
 
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./games/space_word
          file: ./games/space_word/Dockerfile
          push: true
          tags: ghcr.io/${{ github.actor }}/space-word:latest
 
      - name: Setup Pages
        uses: actions/configure-pages@v4
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4